name: Deploy Preview to GitHub Pages

on:
  push:
    branches: [claude/**]
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build and deploy to /dev-env/'
        required: true
        default: 'claude/cross-device-persistence-wD10s'

permissions:
  contents: write

concurrency:
  group: pages-preview
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          BUILD_NUMBER: ${{ github.run_number }}

      - name: Deploy to dev-env subdirectory
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: dev-env
          keep_files: true
