<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="description" content="Track scores and stats for game nights" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Scorekeeper" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="Scorekeeper" />

  <!-- Open Graph -->
  <meta property="og:title" content="Game Night Scorekeeper" />
  <meta property="og:description" content="Track scores and stats for game nights" />
  <meta property="og:type" content="website" />

  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="manifest" href="./manifest.webmanifest" />

  <title>Game Night Scorekeeper</title>

  <style>
    /* Critical inline styles for loading state */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0f172a;
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    [data-theme="light"] body { background: #f8fafc; color: #0f172a; }
    #app { min-height: 100%; }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 1rem;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(99, 102, 241, 0.2);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #94a3b8; font-size: 0.875rem; }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading" aria-live="polite" aria-label="Loading application">
      <div class="spinner" role="status"></div>
      <p class="loading-text">Loading Scorekeeper...</p>
      <p style="font-size:0.65rem;color:#64748b;margin-top:0.25rem"><!--BUILD_INFO--></p>
    </div>
  </div>

  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
