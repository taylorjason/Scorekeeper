<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dice background -->
  <rect x="5" y="5" width="90" height="90" rx="18" ry="18" fill="#6366f1"/>
  <!-- White dots - 6 pattern (2 columns, 3 rows) -->
  <!-- Top left -->
  <circle cx="32" cy="28" r="8" fill="white"/>
  <!-- Top right -->
  <circle cx="68" cy="28" r="8" fill="white"/>
  <!-- Middle left -->
  <circle cx="32" cy="50" r="8" fill="white"/>
  <!-- Middle right -->
  <circle cx="68" cy="50" r="8" fill="white"/>
  <!-- Bottom left -->
  <circle cx="32" cy="72" r="8" fill="white"/>
  <!-- Bottom right -->
  <circle cx="68" cy="72" r="8" fill="white"/>
</svg>
